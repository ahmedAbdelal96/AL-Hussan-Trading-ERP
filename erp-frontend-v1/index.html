    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Alhussan",
        "url": "https://alhussan.tech/"
      }
    </script>

    <!-- Initialize language and direction before React loads -->
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("language-store");
          if (stored) {
            const data = JSON.parse(stored);
            const lang = data.state?.language || "en";
            const dir = lang === "ar" ? "rtl" : "ltr";
            document.documentElement.lang = lang;
            document.documentElement.dir = dir;
            document.documentElement.setAttribute("lang", lang);
            document.documentElement.setAttribute("dir", dir);
          }
        } catch (e) {
          console.error("Failed to initialize language:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
