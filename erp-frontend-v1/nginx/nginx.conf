server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with simple cache headers
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}