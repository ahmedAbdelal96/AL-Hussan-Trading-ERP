services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/erp/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - erp-network

  backend:
    build:
      context: ./erp-backend-v1
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      SYNC_PERMISSIONS_ON_BOOT: ${SYNC_PERMISSIONS_ON_BOOT:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./erp-backend-v1/uploads:/app/uploads
      - ./erp-backend-v1/logs:/app/logs
    expose:
      - "9000"
    networks:
      - erp-network

  frontend:
    build:
      context: ./erp-frontend-v1
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: erp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./erp-frontend-v1/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - erp-network

  caddy:
    image: caddy:2-alpine
    container_name: erp-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  redis-data:
  caddy-data:
  caddy-config:
